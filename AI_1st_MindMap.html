<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI & Intelligent Agents — Mind Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#0d0d1c;height:100vh;overflow:hidden;display:flex;flex-direction:column}

#toolbar{
  display:flex;gap:8px;padding:10px 14px;align-items:center;
  background:#0d0d1c;border-bottom:0.5px solid #1e1e3a;flex-shrink:0;flex-wrap:wrap
}
.tbtn{
  font-size:11.5px;padding:5px 13px;border-radius:6px;
  border:0.5px solid #2a2a50;background:#1a1a32;color:#7080a8;
  cursor:pointer;transition:background 0.15s,color 0.15s;white-space:nowrap
}
.tbtn:hover{background:#22223a;color:#c0d0f0}
.sep{width:0.5px;height:20px;background:#1e1e3a;margin:0 2px}
.zoom-lbl{font-size:11px;color:#3a4a6a;min-width:36px;text-align:center}
.hint-lbl{font-size:10.5px;color:#2a3a5a;margin-left:auto}

#stage{
  flex:1;position:relative;overflow:hidden;
  cursor:grab
}
#stage.panning{cursor:grabbing}

#world{position:absolute;transform-origin:0 0}

#world svg{
  position:absolute;top:0;left:0;
  pointer-events:none;overflow:visible
}

.nd{position:absolute;cursor:grab;touch-action:none;z-index:10}
.nd.ndrag{z-index:999;cursor:grabbing}

.nr{
  background:#534AB7;color:#EEEDFE;border-radius:12px;
  padding:12px 22px;font-size:13px;font-weight:600;
  border:1.5px solid #7F77DD;white-space:nowrap;text-align:center;
  min-width:190px;box-shadow:0 0 28px rgba(83,74,183,0.4)
}
.nb{
  background:#3C3489;color:#CECBF6;border-radius:9px;
  padding:8px 14px;font-size:12px;font-weight:600;
  border:1px solid #534AB7;white-space:nowrap;
  display:flex;align-items:center;gap:7px;
  transition:background 0.15s;
  box-shadow:0 2px 12px rgba(60,52,137,0.3)
}
.nb .chv{font-size:10px;opacity:0.6;transition:transform 0.22s;flex-shrink:0;pointer-events:none}
.nb.open .chv{transform:rotate(90deg)}
.nb:hover{background:#4a3fa0;cursor:pointer}
.nl{
  background:#131828;color:#6070a0;border-radius:7px;
  padding:5px 11px;font-size:11px;
  border:0.5px solid #222840;white-space:nowrap;
  transition:background 0.15s,color 0.15s,border-color 0.15s
}
.nl:hover{background:#1a2040;color:#b0c8f0;border-color:#534AB7;cursor:pointer}

#tip{
  position:fixed;background:#12182e;
  border:0.5px solid #3C3489;border-radius:10px;
  padding:13px 15px;width:270px;font-size:11.5px;
  color:#7080a0;line-height:1.65;z-index:3000;
  pointer-events:none;display:none;
  box-shadow:0 4px 24px rgba(0,0,0,0.5)
}
#tip.show{display:block}
#tip b{color:#CECBF6;display:block;margin-bottom:5px;font-size:12.5px}

#minimap{
  position:fixed;bottom:14px;right:14px;
  width:150px;height:96px;
  background:#0a0a18;border:0.5px solid #1e1e3a;
  border-radius:8px;overflow:hidden;z-index:2000;
  opacity:0.9
}
#minimap canvas{display:block;width:150px;height:96px}
</style>
</head>
<body>

<div id="toolbar">
  <button class="tbtn" onclick="resetAll()">Reset layout</button>
  <button class="tbtn" onclick="expandAll()">Expand all</button>
  <button class="tbtn" onclick="collapseAll()">Collapse all</button>
  <div class="sep"></div>
  <button class="tbtn" onclick="zoomBy(0.15)">+ Zoom in</button>
  <button class="tbtn" onclick="zoomBy(-0.15)">− Zoom out</button>
  <button class="tbtn" onclick="fitAll()">Fit all</button>
  <span class="zoom-lbl" id="zlbl">100%</span>
  <span class="hint-lbl">Pan: drag background &nbsp;·&nbsp; Move node: drag node &nbsp;·&nbsp; Scroll: zoom</span>
</div>

<div id="stage">
  <div id="world">
    <svg id="svg"></svg>
  </div>
</div>
<div id="tip"></div>
<div id="minimap"><canvas id="mmc"></canvas></div>

<script>
const BRANCHES = [
  {
    id:'b0', label:'Nature of Intelligence',
    leaves:[
      {id:'l00', label:'Sensing → Thinking → Acting', tip:'Intelligence involves three core processes. Sensing: translating sensory inputs (percepts) into conceptual representations. Thinking: manipulating the conceptual representation via knowledge representation, problem solving, and learning. Acting: translating intent into physical actions — reflexive or deliberative.'},
      {id:'l01', label:'Sensing', tip:'Translating sensory inputs (percepts) into a conceptual representation. Examples: Computer Vision, Speech Recognition, Language Understanding.'},
      {id:'l02', label:'Thinking', tip:'Manipulation of the conceptual representation. Includes: Knowledge Representation, Problem Solving / Planning, and Learning — making improvements based on results of past actions.'},
      {id:'l03', label:'Acting', tip:'Translating intent into physical actions — reflexive (automatic) or deliberative (planned). Examples: Robotics, Speech and Language Synthesis.'},
    ]
  },
  {
    id:'b1', label:'Four Views of AI',
    leaves:[
      {id:'l10', label:'Thinking humanly', tip:'Concerned with determining how humans think. Two approaches: (1) Mind as higher-level structures — symbols, schemas, plans, rules. (2) Mind as a huge array of small feeble elements (neurons — connectionist view).'},
      {id:'l11', label:'Acting humanly — Turing Test', tip:'Systems that act like human experts. Turing Test: tester (C) questions machine (A) and human (B); if C cannot distinguish them, machine passes. Examples: Expert systems, Chatbots, Personal Assistants, Robots.'},
      {id:'l12', label:'Thinking rationally', tip:'Programs take a problem in logical notation and find a solution. Example: All men are mortal; Socrates is a man; therefore Socrates is mortal. Derives from Greek logic through mathematics and philosophy to modern AI.'},
      {id:'l13', label:'Acting rationally', tip:'Rational behaviour = doing the right thing — maximizing goal achievement given available information. Does not necessarily involve thinking (e.g. blinking reflex). Rational ≠ omniscient and ≠ perfect.'},
    ]
  },
  {
    id:'b2', label:'AI Approaches',
    leaves:[
      {id:'l20', label:'Symbolic / Classical AI', tip:'Explores reducing human intelligence to symbol manipulation. Key concerns: (1) Knowledge Representation — capturing knowledge for computer manipulation. (2) Search — exploring problem states systematically. Chess: board as 2D array, pieces as symbols, best move via minimax or alpha-beta pruning.'},
      {id:'l21', label:'Computational AI', tip:'Combines neural networks, evolution, and fuzzy logic. Chess: neural network trained via self-play; board as 768-element bitboard (8×8×12 pieces); network updated iteratively to improve move probabilities and position evaluations.'},
      {id:'l22', label:'Knowledge Representation', tip:'Capturing knowledge in a language suitable for computer manipulation, expressing the full range of knowledge required for intelligent behaviour — e.g. chess piece positions, rules, moves, evaluation functions.'},
      {id:'l23', label:'Search', tip:'A problem-solving technique that systematically explores a space of problem states to find an answer. In chess: examines effects of different possible moves. Algorithms include minimax and alpha-beta pruning.'},
    ]
  },
  {
    id:'b3', label:'Intelligent Agents',
    leaves:[
      {id:'l30', label:'Definition & structure', tip:'An agent perceives its environment via sensors and acts via actuators. Can be human, robotic, or pure software. Not all agents are intelligent. Intelligent agents operate autonomously in complex environments.'},
      {id:'l31', label:'Agent function / program / architecture', tip:'(1) Agent Function — abstract mapping F:[p→A] from percept sequence to action. (2) Agent Program — concrete implementation running on hardware. (3) Architecture — physical machinery (sensors + actuators), e.g. a PC, a car, or a camera.'},
      {id:'l32', label:'Rationality & autonomy', tip:'Rationality: selecting an action to maximize performance measure given percepts and built-in knowledge. Rational ≠ omniscient and ≠ perfect. Autonomy: extent behaviour is determined by own experience — from no autonomy to full autonomy (learn and adapt).'},
      {id:'l33', label:'PEAS framework', tip:'P = Performance Measure (success criterion). E = Environment (surroundings + knowledge). A = Actions available. S = Sensor percept sequence. Taxi: P=safe/fast/legal/profitable; E=roads/traffic/pedestrians; A=steering/brake/horn; S=cameras/GPS/speedometer.'},
      {id:'l34', label:'5 types of agents', tip:'(1) Simple Reflex — condition-action rules on immediate percepts. (2) Model-Based Reflex — maintains internal world model. (3) Goal-Based — plans to achieve variable goals. (4) Utility-Based — optimizes utility over conflicting goals. (5) Learning Agent — learning element, performance element, critic, problem generator.'},
    ]
  },
  {
    id:'b4', label:'Environment Properties',
    leaves:[
      {id:'l40', label:'Fully / Partially observable', tip:'Fully observable: sensors give complete access to environment state (e.g. chess). Partially observable: sensors give incomplete information (e.g. autonomous driving — cannot see around corners).'},
      {id:'l41', label:'Deterministic / Stochastic', tip:'Deterministic: next state fully determined by current state + action (e.g. chess). Nondeterministic: next state unpredictable. Stochastic: with explicit probabilities (e.g. 25% chance of rain tomorrow).'},
      {id:'l42', label:'Episodic / Sequential', tip:'Episodic: each decision based only on current percept, independent of history (e.g. defect detection on assembly line). Sequential: current decision affects all future ones (e.g. chess, taxi driving).'},
      {id:'l43', label:'Static / Dynamic', tip:'Static: environment does not change while agent decides (e.g. crossword). Dynamic: environment can change during deliberation (e.g. autonomous driving). Semi-dynamic: environment static but score changes with time.'},
      {id:'l44', label:'Discrete / Continuous / Multi-agent', tip:'Discrete: finite states and actions (e.g. checkers). Continuous: infinite states and actions (e.g. truck driving). Single-agent: works alone. Multi-agent: considers other agents — competitive (chess) or cooperative.'},
      {id:'l45', label:'Hardest environment', tip:'Most challenging combines: Partially Observable + Stochastic + Continuous + Dynamic + Sequential. Real example: autonomous taxi — incomplete visibility, probabilistic roads, continuous actions, changing traffic, long-term consequences.'},
    ]
  },
];

const WORLD_W = 2400, WORLD_H = 2000;
const pos = {}, openState = {}, els = {};
const stage  = document.getElementById('stage');
const world  = document.getElementById('world');
const svgEl  = document.getElementById('svg');
const tipEl  = document.getElementById('tip');

let vpX = 0, vpY = 0, scale = 1;

function applyTransform(){
  world.style.transform = `translate(${vpX}px,${vpY}px) scale(${scale})`;
  document.getElementById('zlbl').textContent = Math.round(scale*100)+'%';
  drawMinimap();
}

function zoomBy(delta, cx, cy){
  const ns = Math.min(2.5, Math.max(0.15, scale + delta));
  const ox = cx !== undefined ? cx : stage.offsetWidth/2;
  const oy = cy !== undefined ? cy : stage.offsetHeight/2;
  vpX = ox - (ox - vpX) * (ns/scale);
  vpY = oy - (oy - vpY) * (ns/scale);
  scale = ns;
  applyTransform();
}

function fitAll(){
  const ids = Object.keys(pos).filter(id => els[id] && els[id].style.display !== 'none');
  if(!ids.length) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  ids.forEach(id=>{
    const x=pos[id].x, y=pos[id].y;
    const w=els[id].offsetWidth||120, h=els[id].offsetHeight||30;
    if(x<minX) minX=x; if(y<minY) minY=y;
    if(x+w>maxX) maxX=x+w; if(y+h>maxY) maxY=y+h;
  });
  const pad=60, fw=stage.offsetWidth, fh=stage.offsetHeight;
  const cw=maxX-minX+pad*2, ch=maxY-minY+pad*2;
  scale = Math.min(2.5, Math.max(0.15, Math.min(fw/cw, fh/ch)));
  vpX = (fw - cw*scale)/2 - minX*scale + pad*scale;
  vpY = (fh - ch*scale)/2 - minY*scale + pad*scale;
  applyTransform();
}

function initPos(){
  const cx=WORLD_W/2, cy=WORLD_H/2;
  pos['root']={x:cx-105, y:cy-22};
  const angles=[-2.2,-1.1,0,1.1,2.2];
  BRANCHES.forEach((b,i)=>{
    const a=angles[i], r=260;
    pos[b.id]={x:cx+Math.cos(a)*r-80, y:cy+Math.sin(a)*r-18};
    b.leaves.forEach((l,j)=>{
      const la=a+(j-(b.leaves.length-1)/2)*0.28, lr=470;
      pos[l.id]={x:cx+Math.cos(la)*lr-65, y:cy+Math.sin(la)*lr-14};
    });
  });
}

function nw(id){return els[id]?els[id].offsetWidth:120}
function nh(id){return els[id]?els[id].offsetHeight:30}
function ncx(id){return pos[id].x+nw(id)/2}
function ncy(id){return pos[id].y+nh(id)/2}

function drawLines(){
  svgEl.innerHTML='';
  svgEl.setAttribute('width',WORLD_W);
  svgEl.setAttribute('height',WORLD_H);
  const rcx=ncx('root'), rcy=ncy('root');
  BRANCHES.forEach(b=>{
    const bcx=ncx(b.id), bcy=ncy(b.id);
    const mx=(rcx+bcx)/2;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${rcx},${rcy} C${mx},${rcy} ${mx},${bcy} ${bcx},${bcy}`);
    p.setAttribute('fill','none'); p.setAttribute('stroke','#7F77DD');
    p.setAttribute('stroke-width','2'); p.setAttribute('stroke-opacity','0.6');
    svgEl.appendChild(p);
    if(openState[b.id]){
      b.leaves.forEach(l=>{
        if(!els[l.id]||els[l.id].style.display==='none') return;
        const lcx=ncx(l.id), lcy=ncy(l.id);
        const mx2=(bcx+lcx)/2;
        const p2=document.createElementNS('http://www.w3.org/2000/svg','path');
        p2.setAttribute('d',`M${bcx},${bcy} C${mx2},${bcy} ${mx2},${lcy} ${lcx},${lcy}`);
        p2.setAttribute('fill','none'); p2.setAttribute('stroke','#1D9E75');
        p2.setAttribute('stroke-width','1.3'); p2.setAttribute('stroke-opacity','0.55');
        svgEl.appendChild(p2);
      });
    }
  });
  drawMinimap();
}

function makeDraggable(el, id){
  let ox,oy,dragging=false,moved=false;
  const down=e=>{
    e.stopPropagation();
    dragging=true; moved=false;
    el.classList.add('ndrag');
    const pt=e.touches?e.touches[0]:e;
    ox=(pt.clientX-vpX)/scale - pos[id].x;
    oy=(pt.clientY-vpY)/scale - pos[id].y;
    document.addEventListener('mousemove',mv,{passive:false});
    document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',mv,{passive:false});
    document.addEventListener('touchend',up);
  };
  const mv=e=>{
    if(!dragging) return;
    e.preventDefault();
    const pt=e.touches?e.touches[0]:e;
    const nx=(pt.clientX-vpX)/scale - ox;
    const ny=(pt.clientY-vpY)/scale - oy;
    if(Math.abs(nx-pos[id].x)>3||Math.abs(ny-pos[id].y)>3) moved=true;
    pos[id].x=nx; pos[id].y=ny;
    el.style.left=nx+'px'; el.style.top=ny+'px';
    drawLines();
  };
  const up=()=>{
    dragging=false;
    el._moved=moved;
    el.classList.remove('ndrag');
    document.removeEventListener('mousemove',mv);
    document.removeEventListener('mouseup',up);
    document.removeEventListener('touchmove',mv);
    document.removeEventListener('touchend',up);
  };
  el.addEventListener('mousedown',down);
  el.addEventListener('touchstart',down,{passive:false});
}

function makeEl(id,innerCls,html,onClick,onEnter,onLeave){
  const wrap=document.createElement('div');
  wrap.className='nd'; wrap.id='n_'+id;
  const inner=document.createElement('div');
  inner.className=innerCls; inner.innerHTML=html;
  wrap.appendChild(inner);
  wrap.style.left=pos[id].x+'px';
  wrap.style.top=pos[id].y+'px';
  if(onClick){
    inner.addEventListener('click',e=>{
      e.stopPropagation();
      if(!wrap._moved) onClick(e);
      wrap._moved=false;
    });
  }
  if(onEnter) inner.addEventListener('mouseenter',e=>onEnter(e,wrap));
  if(onLeave) inner.addEventListener('mouseleave',onLeave);
  world.appendChild(wrap);
  els[id]=wrap;
  makeDraggable(wrap,id);
}

function showTip(txt,el){
  tipEl.innerHTML=txt;
  tipEl.classList.add('show');
  const er=el.getBoundingClientRect();
  let x=er.right+10, y=er.top;
  if(x+280>window.innerWidth) x=er.left-285;
  if(y+220>window.innerHeight) y=window.innerHeight-230;
  tipEl.style.left=Math.max(4,x)+'px';
  tipEl.style.top=Math.max(4,y)+'px';
}
function hideTip(){tipEl.classList.remove('show')}

function toggleBranch(b){
  openState[b.id]=!openState[b.id];
  const inner=els[b.id].querySelector('.nb');
  if(inner) inner.classList.toggle('open',openState[b.id]);
  b.leaves.forEach(l=>{
    if(els[l.id]) els[l.id].style.display=openState[b.id]?'block':'none';
  });
  drawLines();
}

function expandAll(){
  BRANCHES.forEach(b=>{ if(!openState[b.id]) toggleBranch(b); });
  setTimeout(fitAll,80);
}
function collapseAll(){
  BRANCHES.forEach(b=>{ if(openState[b.id]) toggleBranch(b); });
}
function resetAll(){
  initPos();
  BRANCHES.forEach(b=>{
    openState[b.id]=false;
    const inner=els[b.id]&&els[b.id].querySelector('.nb');
    if(inner) inner.classList.remove('open');
    b.leaves.forEach(l=>{ if(els[l.id]) els[l.id].style.display='none'; });
  });
  Object.keys(els).forEach(id=>{
    els[id].style.left=pos[id].x+'px';
    els[id].style.top=pos[id].y+'px';
  });
  scale=1;
  vpX=stage.offsetWidth/2 - WORLD_W/2;
  vpY=stage.offsetHeight/2 - WORLD_H/2;
  applyTransform(); drawLines();
}

/* ── Pan on background ── */
let panAnchor=null, isPanning=false;
stage.addEventListener('mousedown',e=>{
  const target=e.target;
  if(target.closest('.nd')) return;
  isPanning=true;
  panAnchor={x:e.clientX-vpX, y:e.clientY-vpY};
  stage.classList.add('panning');
});
document.addEventListener('mousemove',e=>{
  if(!isPanning||!panAnchor) return;
  vpX=e.clientX-panAnchor.x;
  vpY=e.clientY-panAnchor.y;
  applyTransform();
});
document.addEventListener('mouseup',()=>{
  isPanning=false; panAnchor=null;
  stage.classList.remove('panning');
});

/* ── Scroll to zoom ── */
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=stage.getBoundingClientRect();
  zoomBy(e.deltaY<0?0.12:-0.12, e.clientX-rect.left, e.clientY-rect.top);
},{passive:false});

/* ── Pinch zoom ── */
let tDist=null;
stage.addEventListener('touchstart',e=>{
  if(e.touches.length===2)
    tDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
stage.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&tDist!==null){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    zoomBy((d-tDist)*0.005,mx,my);
    tDist=d;
  }
},{passive:true});

/* ── Minimap ── */
function drawMinimap(){
  const canvas=document.getElementById('mmc');
  const ctx=canvas.getContext('2d');
  const mw=150,mh=96;
  canvas.width=mw; canvas.height=mh;
  ctx.fillStyle='#0a0a18'; ctx.fillRect(0,0,mw,mh);
  const sx=mw/WORLD_W, sy=mh/WORLD_H;
  Object.keys(pos).forEach(id=>{
    const el=els[id];
    if(!el||el.style.display==='none') return;
    const w=el.offsetWidth||100, h=el.offsetHeight||26;
    const inner=el.querySelector('[class]');
    const cls=inner?inner.className:'';
    ctx.fillStyle=cls.includes('nr')?'#534AB7':cls.includes('nb')?'#3C3489':'#1e2a4a';
    ctx.fillRect(pos[id].x*sx, pos[id].y*sy, Math.max(2,w*sx), Math.max(2,h*sy));
  });
  const vx=(-vpX/scale)*sx, vy=(-vpY/scale)*sy;
  const vw=(stage.offsetWidth/scale)*sx, vh=(stage.offsetHeight/scale)*sy;
  ctx.strokeStyle='rgba(127,119,221,0.75)'; ctx.lineWidth=1.5;
  ctx.strokeRect(vx,vy,vw,vh);
}

/* ── Build ── */
function build(){
  world.style.width=WORLD_W+'px';
  world.style.height=WORLD_H+'px';
  initPos();
  vpX=stage.offsetWidth/2 - WORLD_W/2;
  vpY=stage.offsetHeight/2 - WORLD_H/2;
  applyTransform();

  makeEl('root','nr','AI &amp; Intelligent Agents');

  BRANCHES.forEach(b=>{
    makeEl(b.id,'nb',`<span>${b.label}</span><span class="chv">›</span>`,()=>toggleBranch(b));
    b.leaves.forEach(l=>{
      makeEl(l.id,'nl',l.label,null,
        (e,wrap)=>showTip(`<b>${l.label}</b>${l.tip}`,wrap),
        hideTip
      );
      els[l.id].style.display='none';
    });
  });

  drawLines();
}

build();
window.addEventListener('resize',()=>{ applyTransform(); drawLines(); });
</script>
</body>
</html>
